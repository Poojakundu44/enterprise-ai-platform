spring:
  application:
    name: gateway-service
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/v1/auth/**
        - id: connector-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/v1/connectors/**
        - id: ingestion-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/v1/ingestion/**
        - id: embedding-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/v1/embeddings/**
        - id: search-service
          uri: http://localhost:8085
          predicates:
            - Path=/api/v1/search/**
        - id: rag-service
          uri: http://localhost:8086
          predicates:
            - Path=/api/v1/rag/**
        - id: agent-service
          uri: http://localhost:8087
          predicates:
            - Path=/api/v1/agents/**
        - id: audit-service
          uri: http://localhost:8088
          predicates:
            - Path=/api/v1/audit/**
        - id: notification-service
          uri: http://localhost:8089
          predicates:
            - Path=/api/v1/notifications/**

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

platform:
  jwt:
    secret: ${JWT_SECRET:enterprise-ai-platform-dev-secret-change-in-production-min-32-chars}
