spring:
  application:
    name: rag-service

server:
  port: ${SERVER_PORT:8086}

platform:
  clients:
    search-base-url: ${SEARCH_SERVICE_URL:http://localhost:8085}
  llm:
    openai-api-key: ${OPENAI_API_KEY:}
    openai-model: ${OPENAI_MODEL:gpt-4o-mini}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
