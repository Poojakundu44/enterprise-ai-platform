spring:
  application:
    name: auth-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:enterprise_ai_auth}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true

platform:
  jwt:
    secret: ${JWT_SECRET:enterprise-ai-platform-dev-secret-change-in-production-min-32-chars}
    issuer: enterprise-ai-platform
    expiration-seconds: ${JWT_EXPIRATION_SECONDS:3600}

server:
  port: ${SERVER_PORT:8081}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
